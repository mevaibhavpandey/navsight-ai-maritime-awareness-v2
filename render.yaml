services:
  - type: web
    name: navsight-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AIS_PROVIDER
        value: demo
      - key: AIS_API_KEY
        value: your_api_key_here
      - key: PYTHON_VERSION
        value: 3.11.0
